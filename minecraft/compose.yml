services:
  mc:
    image: itzg/minecraft-server:latest
    pull_policy: daily
    tty: true
    stdin_open: true
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      TYPE: "FABRIC"
      MODRINTH_PROJECTS: |
        fabric-api
        lithium
        worldedit
      USES_PLUGINS: true
      DIFFICULTY: "0"
      MODE: "creative"
    volumes:
      # attach the relative directory 'data' to the container's /data path
      - ${DATA_LOCATION}:/data